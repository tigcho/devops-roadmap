name: Deploy with SSH

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Install dependencies if not present
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Clone or update repository
            if [ -d /opt/nodejs-service ]; then
              cd /opt/nodejs-service
              git pull origin main
            else
              git clone ${{ github.repositoryUrl }} /opt/nodejs-service
              cd /opt/nodejs-service
            fi

            # Install dependencies
            npm install --production

            # Restart application
            pm2 restart nodejs-service || pm2 start server.js --name nodejs-service
            pm2 save
