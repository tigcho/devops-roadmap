---
- name: Create deployment directory
  file:
    path: /var/www/html
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Check if tarball exists
  stat:
    path: "{{ app_tarball_path }}"
  register: tarball
  delegate_to: localhost
  when: app_tarball_path is defined

- name: Upload and extract website tarball
  unarchive:
    src: "{{ app_tarball_path }}"
    dest: /var/www/html
    owner: www-data
    group: www-data
  when: app_tarball_path is defined and tarball.stat.exists

- name: Deploy from GitHub
  block:
    - name: Ensure git is installed
      apt:
        name: git
        state: present

    - name: Clone or update repository
      git:
        repo: "{{ app_github_repo }}"
        dest: /var/www/html
        version: "{{ app_github_branch | default('main') }}"
        force: yes
        update: yes
      when: app_github_repo is defined
  when: app_tarball_path is not defined
