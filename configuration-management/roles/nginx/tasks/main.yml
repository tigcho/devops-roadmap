---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Start nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Configure nginx site
  template:
    src: site.conf.j2
    dest: /etc/nginx/sites-available/default
  notify: reload nginx

- name: Remove default site symlink
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Create site symlink
  file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link
  notify: reload nginx
